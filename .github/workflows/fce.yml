name: FCE

on:
  workflow_dispatch:
    inputs:
      url:
        description: "ROM Download URL"
        required: true
      file_to_extract:
        description: "Name of the file to extract (e.g., boot, vendor_boot)"
        required: true
      unique_id:
        description: "unique run identifier"
        required: true

permissions:
  contents: write

jobs:
  fce:
    name: ${{ github.event.inputs.unique_id }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/fce:latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run FCE
        run: /entrypoint.sh "${{ github.event.inputs.url }}" "${{ github.event.inputs.file_to_extract }}"

      - name: Copy output to docs
        run: |
          mkdir -p docs/${{ github.event.inputs.unique_id }}
          cp -r /workspace/output/* docs/${{ github.event.inputs.unique_id }}/

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Add output for ${{ github.event.inputs.unique_id }}"
          git push