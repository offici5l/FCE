<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCE - Local Test</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 2rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { text-align: center; color: #444; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button, .download-btn { width: 100%; padding: 1rem; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; text-align: center; text-decoration: none; display: inline-block; }
        button:disabled { background-color: #a0a0a0; }
        button:hover:not(:disabled) { background-color: #0056b3; }
        .status { margin-top: 1.5rem; }
        .log-container { margin-top: 1rem; padding: 1rem; background: #111; color: #eee; border-radius: 4px; font-family: monospace; white-space: pre-wrap; word-wrap: break-word; max-height: 300px; overflow-y: auto; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>FCE Service</h1>
        <form id="fceForm">
            <div class="form-group">
                <label for="url">ROM Download URL</label>
                <input type="url" id="url" placeholder="https://example.com/firmware.zip" required>
            </div>
            <div class="form-group">
                <label for="file">File to Extract</label>
                <input type="text" id="file" placeholder="boot" required>
            </div>
            <button type="submit" id="startBtn">Start Extraction</button>
        </form>

        <div id="statusArea" class="status hidden">
            <h3>Live Log</h3>
            <div id="log" class="log-container"></div>
            <a id="downloadBtn" class="download-btn hidden" href="#">Download File</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
